<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IA | Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #1e3a8a; --navy: #060c1a; --bg: #f8fafc; --border: #e2e8f0; 
      --text-main: #1e293b; --text-muted: #64748b;
      --crit: #ef4444; --maj: #f59e0b; --min: #3b82f6; --success: #10b981;
    }
    * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); margin: 0; color: var(--text-main); font-size: 14px; }

    /* LOGIN UI */
    #loginScreen { position: fixed; inset: 0; background: #f1f5f9; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border: 1px solid var(--border); padding: 40px; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 420px; }
    .login-logo { font-weight: 900; font-size: 2.5rem; color: var(--primary); letter-spacing: -2px; margin-bottom: 5px; }
    #lPin { text-align: center; font-size: 1.5rem; letter-spacing: 8px; height: 55px; background: #f8fafc; border-radius: 15px; border: 2px solid var(--border); margin-top: 10px; }

    .app-header { background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
    
    #pinBox { 
        position: absolute; right: 0; top: 60px; background: white; border: 1px solid var(--border); 
        border-radius: 20px; width: 300px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        z-index: 2000; transform-origin: top right; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #pinBox.hidden { display: none; transform: scale(0.8) translateY(-20px); opacity: 0; }
    .pin-success-banner { background: var(--success); color: white; font-size: 10px; font-weight: 800; padding: 8px; border-radius: 8px; text-align: center; margin-top: 10px; display: none; }

    .container { max-width: 1200px; margin: 2rem auto; padding: 0 25px; }
    .hidden { display: none !important; }
    .card { background: #fff; border-radius: 24px; padding: 30px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
    
    .btn { cursor: pointer; border: none; border-radius: 12px; font-weight: 700; padding: 12px 24px; font-size: 12px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
    .btn-primary { background: var(--navy); color: white; }
    .btn-primary:hover { background: var(--primary); transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }

    .score-widget { display: flex; gap: 8px; background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 10px 15px; }
    .score-item { text-align: center; padding: 0 12px; border-right: 1px solid #f1f5f9; }
    .score-item:last-child { border: none; }
    .score-val { display: block; font-weight: 800; font-size: 16px; }
    .score-lab { font-size: 8px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }

    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 15px; text-align: left; font-size: 10px; text-transform: uppercase; font-weight: 800; color: var(--text-muted); }
    td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    
    .action-btn { 
        border: 1.5px solid #e2e8f0; 
        background: #fff; 
        padding: 10px; 
        border-radius: 12px; 
        cursor: pointer; 
        font-size: 18px; 
        margin: 0 5px; 
        width: 44px; 
        height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .btn-edit:hover { border-color: var(--primary); background: #eff6ff; }
    .btn-del:hover { border-color: var(--crit); background: #fef2f2; }
    .btn-edit { color: var(--primary); }
    .btn-del { color: var(--crit); }

    .badge { padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
    .bg-crit { background: #fee2e2; color: #ef4444; }
    .bg-maj { background: #fef3c7; color: #d97706; }
    .bg-min { background: #dbeafe; color: #2563eb; }

    input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: #fcfdfe; }
    label { font-size: 10px; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; display: block; text-transform: uppercase; }
    
    .photo-area { width: 100%; height: 180px; border: 2px dashed var(--border); border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fbfcfe; }
    .photo-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

<div id="imageModal" onclick="this.style.display='none'" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; display:none; align-items:center; justify-content:center;">
    <img id="modalImg" src="" style="max-width:85%; max-height:85%; border:5px solid #fff; border-radius:12px;">
</div>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">IA</div>
    <p style="font-weight:800; font-size:0.9rem; color:var(--navy); margin-bottom:25px; letter-spacing:1px;">Report</p>
    <div style="text-align: left; padding: 0 10px;">
        <label>Unit Selection</label>
        <select id="lUnit">
            <option value="MASTER USER">MASTER USER</option>
            <option value="UNIT - V">UNIT - V</option>
            <option value="UNIT - PE">UNIT - PE</option>
            <option value="UNIT - SP">UNIT - SP</option>
            <option value="UNIT - R">UNIT - R</option>
            <option value="UNIT - P">UNIT - P</option>
        </select>
        <label style="margin-top:15px;">Security Access PIN</label>
        <input type="password" id="lPin" maxlength="6" placeholder="••••">
    </div>
    <button class="btn btn-primary" style="width:100%; height:50px; margin-top:20px; justify-content:center;" onclick="login()">Enter Portal</button>
  </div>
</div>

<div id="app" class="hidden">
  <header class="app-header">
    <div style="font-weight:900; font-size:1.5rem; color:var(--primary); cursor:pointer;" onclick="showHome()">IA</div>
    <div style="display:flex; align-items:center; gap:12px;">
        <button id="syncBtn" class="btn btn-outline" onclick="fetchFromCloud()">☁️ Sync Cloud</button>
        <div id="pinSettings" class="hidden" style="position:relative;">
            <button class="btn btn-outline" onclick="togglePinBox()">⚙️</button>
            <div id="pinBox" class="hidden">
                <h4 style="margin:0 0 15px; font-size:12px; font-weight:800;">Password Management</h4>
                <div id="pinList"></div>
                <div id="pinSuccess" class="pin-success-banner">✓ CHANGES SAVED</div>
            </div>
        </div>
        <span id="userTag" style="font-size:11px; font-weight:800; color:var(--primary);"></span>
        <button class="btn btn-outline" onclick="location.reload()">Log Out</button>
    </div>
  </header>

  <div id="dash" class="container">
    <div id="hrNew" class="card hidden" style="border-top:5px solid var(--primary);">
        <label>Create Audit Schedule</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1.2fr auto; gap:12px; align-items:end;">
            <select id="nUnit"><option>UNIT - V</option><option>UNIT - PE</option><option>UNIT - SP</option><option>UNIT - R</option><option>UNIT - X (PATRIOT)</option></select>
            <select id="nCat"><option>IA</option><option>5S</option><option>SA</option></select>
            <input type="date" id="nDate">
            <button class="btn btn-primary" onclick="addRep()">Generate Report</button>
        </div>
    </div>
    <div id="repGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div>
  </div>

  <div id="details" class="container hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <button class="btn btn-outline" onclick="showHome()">← Back to Dashboard</button>
        <div class="score-widget">
            <div class="score-item"><span id="sTot" class="score-val">0</span><span class="score-lab">Total</span></div>
            <div class="score-item" style="color:var(--crit)"><span id="sCri" class="score-val">0</span><span class="score-lab">Crit</span></div>
            <div class="score-item" style="color:var(--maj)"><span id="sMaj" class="score-val">0</span><span class="score-lab">Maj</span></div>
            <div class="score-item" style="color:var(--min)"><span id="sMin" class="score-val">0</span><span class="score-lab">Min</span></div>
        </div>
    </div>

    <div class="card" style="border-left:10px solid var(--primary); padding:20px 30px;">
        <h2 id="hTitle" style="margin:0; font-size:20px; font-weight:800;"></h2>
        <p id="hUnit" style="margin:4px 0 0; color:var(--primary); font-size:12px; font-weight:700; text-transform:uppercase;"></p>
    </div>

    <div id="addSection" class="card" style="text-align: center;">
        <h4 style="text-align:left; font-size:12px; margin-bottom:15px; color:var(--text-muted);">ADD NON-CONFORMITY</h4>
        <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:25px; text-align:left;">
            <div>
                <label>Observation Details</label>
                <textarea id="fDesc" rows="4" placeholder="Enter findings..."></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:10px;">
                    <div><label>Dept</label><select id="fDept"><option>SEWING</option><option>CUTTING</option><option>STORE</option><option>QUALITY</option><option>FINISHING</option><option>FABRIC</option><option>SAMPLE</option><option>MACHINE MAINTENANCE</option><option>ADMIN</option><option>HR</option><option>ELECTRICAL MAINTENANCE</option></select></div>
                    <div><label>Severity</label><select id="fSev"><option value="crit">CRITICAL</option><option value="maj">MAJOR</option><option value="min">MINOR</option></select></div>
                    <div><label>Status</label><select id="fStat"><option>Open</option><option>Closed</option></select></div>
                </div>
            </div>
            <div class="photo-area" onclick="document.getElementById('fFile').click()">
                <span id="fPrompt">📸 SNAP PHOTO</span>
                <input type="file" id="fFile" hidden accept="image/*" onchange="loadImg(this)">
                <img id="fPreview" style="display:none;">
            </div>
        </div>
        <button class="btn btn-primary" style="margin-top:25px; padding:15px 60px; font-size:14px;" onclick="saveNC()">UPLOAD TO CLOUD DATABASE</button>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
        <table>
            <thead><tr><th>Evidence</th><th>Dept</th><th>Observation</th><th>Class</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="fTable"></tbody>
        </table>
    </div>
  </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzrTCN2KKT9BpiYpfANP5SMbQg-mB1na6Va573MHulOhxcCITO7g3Ithdy2Gv8RP7VowA/exec";
    
    let db = [];
    let pins = {
        "MASTER USER": "3355", 
        "UNIT - V": "1100", 
        "UNIT - PE": "0220", 
        "UNIT - SP": "8822", 
        "UNIT - R": "5151", 
        "UNIT - P": "1001"
    };

    let user = ""; let isMASTER = false; let activeTitle = ""; let activeUnit = ""; let tempImg = "";

    async function login() {
        const u = document.getElementById('lUnit').value;
        const p = document.getElementById('lPin').value;
        if(pins[u] === p) {
            user = u; isHR = (u === "MASTER USER");
            document.getElementById('userTag').innerText = u;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            if(isMASTER) { 
                document.getElementById('masterNew').classList.remove('hidden'); 
                document.getElementById('pinSettings').classList.remove('hidden'); 
                renderPinList(); 
            }
            await fetchFromCloud();
        } else { alert("Invalid Security PIN"); }
    }

    function togglePinBox() { document.getElementById('pinBox').classList.toggle('hidden'); }

    function renderPinList() {
        const list = document.getElementById('pinList'); list.innerHTML = '';
        for(let u in pins) {
            list.innerHTML += `<div style="margin-bottom:12px;"><label style="font-size:8px;">${u}</label>
            <input type="text" value="${pins[u]}" style="padding:8px; height:35px; font-size:12px; font-weight:700;" onchange="updatePin('${u}', this.value)"></div>`;
        }
    }

    function updatePin(u, v) {
        pins[u] = v;
        const banner = document.getElementById('pinSuccess'); banner.style.display = 'block';
        setTimeout(() => { banner.style.display = 'none'; }, 2000);
    }

    async function fetchFromCloud() {
        const btn = document.getElementById('syncBtn');
        btn.style.opacity = "0.5";
        btn.innerText = "⌛ Downloading...";
        try {
            const response = await fetch(GOOGLE_URL);
            const allData = await response.json();
            db = []; 
            const groups = {};
            allData.forEach(item => {
                const key = `${item.unit}|${item.title}`;
                if(!groups[key]) groups[key] = { unit: item.unit, title: item.title, findings: [] };
                groups[key].findings.push(item);
            });
            db = Object.values(groups);
            showHome();
        } catch(e) { alert("Network too slow. Try again."); }
        btn.style.opacity = "1";
        btn.innerText = "☁️ Sync Cloud";
    }

    function showHome() {
        document.getElementById('dash').classList.remove('hidden');
        document.getElementById('details').classList.add('hidden');
        const grid = document.getElementById('repGrid'); grid.innerHTML = '';
        const data = isHR ? db : db.filter(r => r.unit === user);
        
        data.forEach(r => {
            grid.innerHTML += `<div class="card" onclick="openRep('${r.unit}', '${r.title}')" style="cursor:pointer; padding:25px; border-bottom:4px solid #eee;">
                <div style="font-size:9px; font-weight:900; color:var(--text-muted); text-transform:uppercase;">${r.unit}</div>
                <h3 style="margin:10px 0; font-size:16px; font-weight:800;">${r.title}</h3>
                <div style="font-weight:800; color:var(--primary); font-size:11px;">${r.findings.length} RECORDS</div>
            </div>`;
        });
    }

    function openRep(unit, title) {
        activeUnit = unit; activeTitle = title;
        document.getElementById('hTitle').innerText = title; 
        document.getElementById('hUnit').innerText = unit;
        document.getElementById('dash').classList.add('hidden'); 
        document.getElementById('details').classList.remove('hidden');
        
        if (isHR) { document.getElementById('addSection').classList.remove('hidden'); } 
        else { document.getElementById('addSection').classList.add('hidden'); }
        renderTable();
    }

    function renderTable() {
        const report = db.find(r => r.unit === activeUnit && r.title === activeTitle) || { findings: [] };
        const tbody = document.getElementById('fTable'); 
        tbody.innerHTML = '';
        
        report.findings.forEach((f, idx) => {
            let actionColumn = isHR ? `
                <td>
                    <button class="action-btn btn-edit" onclick="editRow('${idx}')">✎</button>
                    <button class="action-btn btn-del" onclick="deleteRow('${idx}')">🗑</button>
                </td>` : `<td><span style="font-size:10px; color:#999;">VIEW ONLY</span></td>`;

            tbody.innerHTML += `<tr>
                <td><img src="${f.img}" style="width:55px; height:55px; border-radius:10px; object-fit:cover;" onclick="zoomImg('${f.img}')"></td>
                <td style="font-weight:800;">${f.dept}</td>
                <td style="max-width:300px;">${f.desc}</td>
                <td><span class="badge bg-${f.sev}">${f.sev}</span></td>
                <td><span style="font-weight:900; color:${f.stat==='Open'?'#ef4444':'#10b981'}">${f.stat.toUpperCase()}</span></td>
                ${actionColumn}
            </tr>`;
        });
        updateScore(report.findings);
    }

    function updateScore(findings) {
        document.getElementById('sTot').innerText = findings.length;
        document.getElementById('sCri').innerText = findings.filter(f => f.sev === 'crit').length;
        document.getElementById('sMaj').innerText = findings.filter(f => f.sev === 'maj').length;
        document.getElementById('sMin').innerText = findings.filter(f => f.sev === 'min').length;
    }

    function deleteRow(idx) {
        if (!isHR) return alert("ACCESS DENIED");
        if (confirm("HR MASTER ACCESS: Delete record?")) {
            const rIdx = db.findIndex(r => r.unit === activeUnit && r.title === activeTitle);
            db[rIdx].findings.splice(idx, 1);
            renderTable();
        }
    }

    function editRow(idx) {
        const rIdx = db.findIndex(r => r.unit === activeUnit && r.title === activeTitle);
        const data = db[rIdx].findings[idx];
        document.getElementById('fDesc').value = data.desc;
        document.getElementById('fDept').value = data.dept;
        document.getElementById('fSev').value = data.sev;
        document.getElementById('fStat').value = data.stat;
        if(data.img !== "No Photo") {
            document.getElementById('fPreview').src = data.img;
            document.getElementById('fPreview').style.display = 'block';
            document.getElementById('fPrompt').style.display = 'none';
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function saveNC() {
        const desc = document.getElementById('fDesc').value; if(!desc) return alert("Observation required");
        const entry = { unit: activeUnit, title: activeTitle, dept: document.getElementById('fDept').value, desc: desc, sev: document.getElementById('fSev').value, stat: document.getElementById('fStat').value, img: tempImg || "No Photo" };
        const rIdx = db.findIndex(r => r.unit === activeUnit && r.title === activeTitle);
        db[rIdx].findings.unshift(entry);
        renderTable(); resetForm();
        await fetch(GOOGLE_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(entry) });
        setTimeout(fetchFromCloud, 2000);
    }

    function resetForm() {
        document.getElementById('fDesc').value = '';
        document.getElementById('fPreview').style.display = 'none';
        document.getElementById('fPrompt').style.display = 'block';
        tempImg = "";
    }

    function addRep() {
        const date = document.getElementById('nDate').value; if(!date) return alert("Date required");
        const m = new Date(date).toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
        const title = `${document.getElementById('nCat').value} - ${m}`;
        const unit = document.getElementById('nUnit').value;
        if(!db.find(r => r.unit === unit && r.title === title)) db.unshift({ unit: unit, title: title, findings: [] });
        showHome();
    }
  
    function loadImg(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 600) { h *= 600 / w; w = 600; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    tempImg = canvas.toDataURL('image/jpeg', 0.4); 
                    document.getElementById('fPreview').src = tempImg;
                    document.getElementById('fPreview').style.display = 'block';
                    document.getElementById('fPrompt').style.display = 'none';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function zoomImg(src) {
        if(src === "No Photo") return;
        document.getElementById('modalImg').src = src;
        document.getElementById('imageModal').style.display = 'flex';
    }
</script>
</body>
</html>
